version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    # For AMD GPU passthrough on a ROCm host, uncomment and adjust:
    # devices:
    #   - /dev/kfd
    #   - /dev/dri
    # group_add:
    #   - video

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "7860:7860"
    depends_on:
      - backend
    environment:
      - POULTRYGUARD_BACKEND_URL=http://backend:8000
